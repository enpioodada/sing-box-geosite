name: Sync Rules

on:
  push:
    branches: [ main ]       # push 到 main 分支触发
  workflow_dispatch:          # 手动触发
  schedule:
    - cron: "0 12 * * *"     # 每天 12:00 定时触发

concurrency:
  group: rules
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 获取代码
      - uses: actions/checkout@v4

      # 设置 Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 安装依赖
      - run: pip install -r requirements.txt

      # 安装 sing-box
      - name: Install sing-box
        run: |
          VERSION="1.13.3"
          curl -L https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz -o sb.tar.gz
          tar -xzf sb.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/

      # 确保输出目录存在
      - name: Prepare output directory
        run: mkdir -p rule

      # 运行 main.py
      - name: Run main.py
        run: python main.py

      # 提交并推送更新的 JSON/SRS 文件
      - name: Commit and push
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com

          git add rule/*.json rule/*.srs

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          else
            git commit -m "Update rules"
            git push
          fi
